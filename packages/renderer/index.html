<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>No True Man Show</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; }
    canvas {
      /* Let browser handle scaling smoothly */
      image-rendering: auto;
    }
    #game-container {
      width: 100vw;
      max-width: 100%;
      aspect-ratio: 16/9;
    }
    #start-overlay {
      position: fixed; inset: 0; z-index: 1000;
      display: flex; flex-direction: column; justify-content: center; align-items: center;
      background: #0a0a1a; cursor: pointer; user-select: none;
      font-family: 'Space Grotesk', 'Inter', sans-serif;
    }
    #start-overlay .title {
      color: #ffd93d; font-size: 36px; font-weight: 700;
      margin-bottom: 12px; letter-spacing: 2px;
      text-shadow: 0 0 30px rgba(255, 217, 61, 0.3);
    }
    #start-overlay .subtitle {
      color: #6ec6ff; font-size: 16px; font-weight: 400;
      margin-bottom: 60px; opacity: 0.7; letter-spacing: 4px;
      font-family: 'Inter', sans-serif; font-style: italic;
    }
    #start-overlay .cta {
      color: #888; font-size: 14px; font-weight: 500;
      animation: pulse 2s ease-in-out infinite;
      letter-spacing: 1px;
    }
    @keyframes pulse { 0%,100% { opacity: 0.3; } 50% { opacity: 0.9; } }
  </style>
</head>
<body>
  <div id="start-overlay">
    <div class="title">No True Man Show</div>
    <div class="subtitle">a life, observed</div>
    <div class="cta">Click to start</div>
  </div>
  <div id="game-container"></div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
