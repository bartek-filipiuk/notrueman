# Production Docker Compose — Full 24/7 streaming stack
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# Requires .env with: RTMP_URL, OPENROUTER_API_KEY, and other secrets
# See .env.example for all available variables

services:
  # === Renderer + Brain (serves the Phaser game) ===
  app:
    build:
      context: .
      dockerfile: packages/renderer/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:?OPENROUTER_API_KEY is required}
      - DATABASE_URL=postgresql://${POSTGRES_USER:-truman}:${POSTGRES_PASSWORD:-truman}@postgres:5432/${POSTGRES_DB:-truman}
      - REDIS_URL=redis://redis:6379
      - TTS_BASE_URL=${TTS_BASE_URL:-}
      - TTS_API_KEY=${TTS_API_KEY:-}
      - DAILY_COST_CAP_USD=${DAILY_COST_CAP_USD:-5.00}
    ports:
      - "5173:5173"
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 256M
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:5173/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  # === Browser + Streaming (Chromium + XVFB + FFmpeg → RTMP) ===
  streamer:
    build:
      context: ./packages/stream-manager/docker
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      app:
        condition: service_healthy
    environment:
      - DISPLAY=:99
      - STREAM_URL=http://app:5173/?apiKey=${OPENROUTER_API_KEY}&tts=${TTS_ENABLED:-off}&openaiKey=${TTS_API_KEY:-}&voice=${TTS_VOICE:-echo}
      - RTMP_URL=${RTMP_URL:?RTMP_URL is required}
      - RESOLUTION=${STREAM_RESOLUTION:-960x540}
      - FRAMERATE=${STREAM_FRAMERATE:-30}
      - VIDEO_BITRATE=${STREAM_VIDEO_BITRATE:-4500k}
      - AUDIO_BITRATE=${STREAM_AUDIO_BITRATE:-160k}
      - RECYCLE_INTERVAL_S=${BROWSER_RECYCLE_INTERVAL:-14400}
      - MAX_MEMORY_MB=${BROWSER_MAX_MEMORY_MB:-2048}
      - CHROME_FLAGS=${CHROME_FLAGS:-}
    shm_size: "2gb"
    deploy:
      resources:
        limits:
          cpus: "4.0"
          memory: 4G
        reservations:
          cpus: "2.0"
          memory: 2G
    healthcheck:
      test: ["CMD-SHELL", "pgrep -x ffmpeg && pgrep -f chromium || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  # === Reverse Proxy (Caddy — auto-HTTPS) ===
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      app:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"

  # === Override dev-only settings for production ===
  postgres:
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G
        reservations:
          cpus: "0.25"
          memory: 256M
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"

  redis:
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          cpus: "0.1"
          memory: 128M
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"

volumes:
  caddy_data:
  caddy_config:
