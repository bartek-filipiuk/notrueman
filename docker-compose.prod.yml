# Production Docker Compose — V1.0 Web App + Brain API
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# Requires .env with all secrets. See .env.example for all variables.

services:
  # === Companion Web + Renderer (static files) ===
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:?OPENROUTER_API_KEY is required}
      - BRAVE_SEARCH_API_KEY=${BRAVE_SEARCH_API_KEY:-}
      - DATABASE_URL=postgresql://${POSTGRES_USER:-truman}:${POSTGRES_PASSWORD:-truman}@postgres:5432/${POSTGRES_DB:-truman}
      - REDIS_URL=redis://redis:6379
      - TTS_BASE_URL=${TTS_BASE_URL:-}
      - TTS_API_KEY=${TTS_API_KEY:-}
      - DAILY_COST_CAP_USD=${DAILY_COST_CAP_USD:-5.00}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:?ADMIN_PASSWORD is required}
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET is required}
      - CORS_ORIGIN=${CORS_ORIGIN:-}
    ports:
      - "5173:5173"
      - "3001:3001"
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 1G
        reservations:
          cpus: "0.5"
          memory: 512M
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3001/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  # === Browser + Streaming (Chromium + XVFB + FFmpeg → RTMP) ===
  streamer:
    build:
      context: ./packages/stream-manager/docker
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      app:
        condition: service_healthy
    environment:
      - DISPLAY=:99
      - STREAM_URL=http://app:5173/?apiKey=${OPENROUTER_API_KEY}&tts=${TTS_ENABLED:-off}&openaiKey=${TTS_API_KEY:-}&voice=${TTS_VOICE:-echo}
      - RTMP_URL=${RTMP_URL:-}
      - RESOLUTION=${STREAM_RESOLUTION:-960x540}
      - FRAMERATE=${STREAM_FRAMERATE:-30}
      - VIDEO_BITRATE=${STREAM_VIDEO_BITRATE:-4500k}
      - AUDIO_BITRATE=${STREAM_AUDIO_BITRATE:-160k}
      - RECYCLE_INTERVAL_S=${BROWSER_RECYCLE_INTERVAL:-14400}
      - MAX_MEMORY_MB=${BROWSER_MAX_MEMORY_MB:-2048}
      - CHROME_FLAGS=${CHROME_FLAGS:-}
    shm_size: "2gb"
    profiles:
      - streaming
    deploy:
      resources:
        limits:
          cpus: "4.0"
          memory: 4G
        reservations:
          cpus: "2.0"
          memory: 2G
    healthcheck:
      test: ["CMD-SHELL", "pgrep -x ffmpeg && pgrep -f chromium || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  # === Reverse Proxy (Caddy — auto-HTTPS) ===
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      app:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"

  # === PostgreSQL with pgvector (internal only) ===
  postgres:
    # No external ports — internal network only
    ports: !reset []
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G
        reservations:
          cpus: "0.25"
          memory: 256M
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"

  # === Redis (internal only) ===
  redis:
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    # No external ports — internal network only
    ports: !reset []
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          cpus: "0.1"
          memory: 128M
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"

volumes:
  caddy_data:
  caddy_config:
